---
layout: home
---

<section id="about">
  <div class="container">
    <div class="avatar">
      <img class="img-circle" src="{{ site.baseurl }}static/img/{{ site.avatar }}" alt="{{ site.author }}">
    </div>

    <h1>{{ site.author }}</h1>
    <h3>Principal Software Engineer</h3>
    <h3>maryami at gmail dot com</h3>

    <div class="social">

      <div class="about-link-row">
        <div class="about-link-title">Code</div>
        <div class="about-link-logo">
          <a href="https://github.com/{{ site.github }}">
            <img class="link-logo-img" src="{{ site.baseurl }}static/img/github.png" alt="GitHub">
          </a>
        </div>
      </div>

      <div class="about-link-row">
        <div class="about-link-title">Writing</div>
        <div class="about-link-logo">
          <a href="{{ site.medium }}">
            <i class="fa fa-medium link-logo-icon"></i>
          </a>
        </div>
      </div>

      <div class="about-link-row">
        <div class="about-link-title">Work</div>
        <div class="about-link-logo">
          <a href="https://linkedin.com/in/{{ site.linkedin }}">
            <img class="link-logo-img" src="{{ site.baseurl }}static/img/linkedin.png" alt="LinkedIn">
          </a>
        </div>
      </div>

      <div class="about-link-row">
        <div class="about-link-title">Courses</div>
        <div class="about-link-logo">
          <a href="{{ site.baseurl }}courses.html">
            <i class="fa fa-graduation-cap link-logo-icon"></i>
          </a>
        </div>
      </div>

    </div>

  </div>
</section>
